<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>2048 — Game Rahasia 🎮</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===================== 2048 CORE CSS (FULL VERSION) ===================== */
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0; background: #faf8ef;
      font-family: 'Poppins', sans-serif; font-size: 18px; color: #776e65;
      overflow: hidden; touch-action: none;
    }
    .container {
      width: 100%; max-width: 500px; margin: 0 auto; padding: 15px; display: none;
    }
    .heading { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .title { font-size: 3rem; font-weight: bold; margin: 0; color: #776e65; }
    .scores-container { display: flex; gap: 10px; }
    .score-container {
      background: #bbada0; padding: 8px 15px; border-radius: 6px;
      text-align: center; color: #fff; min-width: 70px; font-weight: bold;
    }
    .score-container::before { content: "SCORE"; display: block; font-size: 0.7rem; opacity: 0.8; }

    /* GAME BOARD */
    .game-container {
      position: relative; padding: 10px; cursor: default;
      background: #bbada0; border-radius: 8px;
      width: 100%; aspect-ratio: 1/1; max-width: 450px; margin: 0 auto;
    }
    .grid-container {
      display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr);
      gap: 10px; width: 100%; height: 100%;
    }
    .grid-cell { background: rgba(238,228,218,0.35); border-radius: 4px; width: 100%; height: 100%; }

    /* TILE CONTAINER & TILES */
    .tile-container {
      position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; z-index: 2;
    }
    .tile {
      position: absolute; display: flex; align-items: center; justify-content: center;
      border-radius: 4px; font-weight: bold; font-size: 2rem;
      transition: 150ms ease-in-out; transition-property: transform, top, left;
      width: calc(25% - 7.5px); height: calc(25% - 7.5px);
    }
    
    @media (max-width: 400px) { .tile { font-size: 1.5rem; } }

    /* Tile colors */
    .tile-2   { background: #eee4da; color: #776e65; }
    .tile-4   { background: #ede0c8; color: #776e65; }
    .tile-8   { background: #f2b179; color: #f9f6f2; }
    .tile-16  { background: #f59563; color: #f9f6f2; }
    .tile-32  { background: #f67c5f; color: #f9f6f2; }
    .tile-64  { background: #f65e3b; color: #f9f6f2; }
    .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 1.6rem; }
    .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 1.6rem; }
    .tile-512 { background: #edc850; color: #f9f6f2; font-size: 1.6rem; }
    .tile-1024{ background: #edc53f; color: #f9f6f2; font-size: 1.2rem; }
    .tile-2048{ background: #edc22e; color: #f9f6f2; font-size: 1.2rem; box-shadow: 0 0 30px 10px rgba(243,215,116,0.5); }

    /* Animations */
    .tile-new { animation: appear 0.2s ease-in-out; animation-fill-mode: backwards; }
    @keyframes appear { 0%{opacity:0;transform:scale(0)} 100%{opacity:1;transform:scale(1)} }
    .tile-merged { animation: pop 0.2s ease-in-out; animation-fill-mode: backwards; z-index: 20; }
    @keyframes pop { 0%{transform:scale(0)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

    /* ===================== HOW-TO-PLAY OVERLAY ===================== */
    #howToPlayOverlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 99999; display: flex;
    }
    .htp-left {
      flex: 1; background: linear-gradient(145deg, #2a5470 0%, #1e3c5a 60%, #162e47 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center;
    }
    .htp-logo { z-index: 1; color: white;}
    .htp-logo .logo-emoji { font-size: 4rem; margin-bottom: 10px; display: block;}
    .htp-logo h2 { font-size: 1.5rem; margin: 0; letter-spacing: 1px;}
    .htp-right {
      flex: 1; background: #12233a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
    }
    .htp-step {
      background: rgba(255,255,255,0.06); border-radius: 12px; padding: 15px; margin-bottom: 15px;
      display: flex; gap: 15px; align-items: center; color: #fff; width: 100%; max-width: 300px;
    }
    .step-icon { font-size: 1.5rem; }
    .step-text { font-size: 0.85rem; line-height: 1.5; }
    .btn-mulai {
      width: 100%; max-width: 300px; padding: 15px; background: linear-gradient(135deg, #e8507a, #c0254e);
      border: none; border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px;
    }
    @media (max-width: 600px) {
      #howToPlayOverlay { flex-direction: column; }
      .htp-left { flex: none; padding: 30px; }
      .htp-right { flex: 1; justify-content: flex-start; padding-top: 40px;}
    }

    /* OVERLAY KEMENANGAN */
    #winScreen {
      display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(237,194,46,0.8); z-index: 100;
      flex-direction: column; align-items: center; justify-content: center;
      border-radius: 8px; color: white; text-align: center;
    }
    #winScreen h1 { font-size: 3rem; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    #winScreen p { font-size: 1.2rem; font-weight: bold; }
  </style>
</head>
<body>

  <div id="howToPlayOverlay">
    <div class="htp-left">
      <div class="htp-logo">
        <span class="logo-emoji">🎮</span>
        <h2>Level Terakhir</h2>
        <p style="opacity: 0.7; font-size: 0.9rem;">Satu game lagi buat buka hadiahmu.</p>
      </div>
    </div>
    <div class="htp-right">
      <div class="htp-step">
        <span class="step-icon">👆</span>
        <div class="step-text"><strong>Geser (swipe)</strong> layar untuk memindahkan semua kotak.</div>
      </div>
      <div class="htp-step">
        <span class="step-icon">🔢</span>
        <div class="step-text">Angka yang sama akan <strong>bergabung</strong> jadi satu (2+2=4).</div>
      </div>
      <div class="htp-step">
        <span class="step-icon">🏆</span>
        <div class="step-text">Capai angka <strong>2048</strong> untuk membuka halaman rahasia!</div>
      </div>
      <button class="btn-mulai" onclick="mulaiGame()">Mulai Main! 🚀</button>
    </div>
  </div>

  <div class="container" id="gameContainer">
    <div class="heading">
      <h1 class="title">2048</h1>
      <div class="scores-container">
        <div class="score-container" id="scoreValue">0</div>
      </div>
    </div>
    <div class="game-container">
      <div class="grid-container">
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
      </div>
      <div class="tile-container" id="tileContainer"></div>
      
      <div id="winScreen">
        <h1>YEAY! 🎉</h1>
        <p>Memuat hadiah Anggie...</p>
      </div>
    </div>
  </div>

  <script>
    // FULL ENGINE 2048 JAVASCRIPT
    let board = [];
    let score = 0;
    let hasWon = false;
    const size = 4;

    function mulaiGame() {
      document.getElementById('howToPlayOverlay').style.display = 'none';
      document.getElementById('gameContainer').style.display = 'block';
      initBoard();
    }

    function initBoard() {
      board = Array(size).fill().map(() => Array(size).fill(0));
      score = 0;
      hasWon = false;
      updateScore();
      addRandomTile();
      addRandomTile();
      renderBoard();
    }

    function addRandomTile() {
      let emptyCells = [];
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (board[r][c] === 0) emptyCells.push({r, c});
        }
      }
      if (emptyCells.length > 0) {
        let randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        board[randomCell.r][randomCell.c] = Math.random() < 0.9 ? 2 : 4;
        // Penanda animasi spawn
        board[randomCell.r][randomCell.c] = { value: board[randomCell.r][randomCell.c], isNew: true };
      }
    }

    function renderBoard() {
      const container = document.getElementById('tileContainer');
      container.innerHTML = '';
      
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          let cell = board[r][c];
          if (cell !== 0) {
            let val = typeof cell === 'object' ? cell.value : cell;
            let tileDiv = document.createElement('div');
            
            // Logika Posisi Persen biar responsif
            let topPos = (r * 25) + "%";
            let leftPos = (c * 25) + "%";
            // Koreksi margin gap (karena gap flex/grid susah di-absolute, kita pakai calc)
            tileDiv.style.top = `calc(${topPos} + ${(r * 2.5)}px)`;
            tileDiv.style.left = `calc(${leftPos} + ${(c * 2.5)}px)`;
            
            let classes = ['tile', `tile-${val}`];
            if (typeof cell === 'object' && cell.isNew) classes.push('tile-new');
            if (typeof cell === 'object' && cell.isMerged) classes.push('tile-merged');
            
            tileDiv.className = classes.join(' ');
            tileDiv.textContent = val;
            container.appendChild(tileDiv);

            // Cek Kemenangan
            if (val >= 2048 && !hasWon) {
              triggerWin();
            }

            // Normalisasi data board setelah render animasi
            board[r][c] = val; 
          }
        }
      }
    }

    function triggerWin() {
      hasWon = true;
      document.getElementById('winScreen').style.display = 'flex';
      setTimeout(() => {
        window.location.href = "sandi.html";
      }, 2500);
    }

    function updateScore() {
      document.getElementById('scoreValue').textContent = score;
    }

    function move(direction) {
      if (hasWon) return;
      let moved = false;

      // Putar board biar logic gesernya cukup 1 arah (kiri)
      let tempBoard = rotateBoard(board, direction);
      
      for (let r = 0; r < size; r++) {
        let row = tempBoard[r];
        let newRow = row.filter(val => val !== 0); // Buang angka 0
        
        // Merge
        for (let i = 0; i < newRow.length - 1; i++) {
          if (newRow[i] !== 0 && newRow[i] === newRow[i + 1]) {
            newRow[i] = { value: newRow[i] * 2, isMerged: true };
            score += newRow[i].value;
            newRow[i + 1] = 0;
            moved = true;
          }
        }
        
        // Buang 0 lagi setelah merge, lalu isi sisa array dengan 0
        newRow = newRow.filter(val => val !== 0);
        while (newRow.length < size) newRow.push(0);
        
        // Cek apa ada perubahan posisi
        for (let c = 0; c < size; c++) {
          let oldVal = typeof row[c] === 'object' ? row[c].value : row[c];
          let newVal = typeof newRow[c] === 'object' ? newRow[c].value : newRow[c];
          if (oldVal !== newVal) moved = true;
        }
        
        tempBoard[r] = newRow;
      }

      // Putar balik ke posisi semula
      board = rotateBoard(tempBoard, (4 - direction) % 4);

      if (moved) {
        updateScore();
        addRandomTile();
        renderBoard();
      }
    }

    // 0: Kiri, 1: Bawah, 2: Kanan, 3: Atas
    function rotateBoard(matrix, times) {
      let result = matrix;
      for (let i = 0; i < times; i++) {
        let newMatrix = Array(size).fill().map(() => Array(size).fill(0));
        for (let r = 0; r < size; r++) {
          for (let c = 0; c < size; c++) {
            newMatrix[c][size - 1 - r] = result[r][c];
          }
        }
        result = newMatrix;
      }
      return result;
    }

    // KONTROL KEYBOARD
    document.addEventListener('keydown', (e) => {
      if (hasWon) return;
      switch (e.key) {
        case 'ArrowLeft':  move(0); break;
        case 'ArrowDown':  move(1); break;
        case 'ArrowRight': move(2); break;
        case 'ArrowUp':    move(3); break;
      }
    });

    // KONTROL SWIPE (TOUCH) ANTI BUG
    let touchStartX = 0, touchStartY = 0;
    const gameArea = document.getElementById('gameContainer');

    gameArea.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }, { passive: false });

    // Matikan scroll saat jari menyentuh kotak game biar lancar
    gameArea.addEventListener('touchmove', (e) => {
      e.preventDefault();
    }, { passive: false });

    gameArea.addEventListener('touchend', (e) => {
      if (hasWon) return;
      let touchEndX = e.changedTouches[0].screenX;
      let touchEndY = e.changedTouches[0].screenY;
      
      let dx = touchEndX - touchStartX;
      let dy = touchEndY - touchStartY;
      
      // Deteksi usapan minimal 30px
      if (Math.abs(dx) > Math.abs(dy)) {
        if (Math.abs(dx) > 30) {
          dx > 0 ? move(2) : move(0); // Kanan : Kiri
        }
      } else {
        if (Math.abs(dy) > 30) {
          dy > 0 ? move(1) : move(3); // Bawah : Atas
        }
      }
    });
  </script>
</body>
</html>
