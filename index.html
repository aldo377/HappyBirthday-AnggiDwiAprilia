<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/style.css">
    <title>Kado Spesial Buat Anggie</title>
</head>
<body>
    <div class="login_container">
        <h2>Hi 👋 Anggie, masukin PIN dulu yuk</h2>
        <form id="loginForm" class="login_form">
            <input type="password" id="pinInput" placeholder="Masukkan 6 Digit PIN" required />
            <button type="submit" id="loginBtn">Buka Kado 🎁</button>
        </form>
        <p class="login_description">
            pssttt, PIN-nya berhubungan sama tanggal lahir kamu ya!
        </p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>	
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        // SCRIPT PIN LANGSUNG DI SINI (Gantiin index.js yang terhapus)
        document.getElementById("loginForm").addEventListener("submit", function (e) {
          e.preventDefault();
          var pinInput = document.getElementById("pinInput").value;

          if (pinInput === "200408") {
            Swal.fire({
              icon: "success",
              title: "PIN Benar! 🎉",
              text: "Selamat ulang tahun sayang!",
              showConfirmButton: false,
              timer: 2000,
            }).then(function () {
              window.location.href = "birthday.html";
            });
          } else {
            Swal.fire({
              icon: "error",
              title: "PIN Salah! ❌",
              text: "Coba inget tanggal lahir kamu...",
              confirmButtonText: "Coba lagi",
              confirmButtonColor: "#ff7675",
            });
            document.getElementById("pinInput").value = "";
          }
        });
    </script>
</body>
</html>
