<!DOCTYPE html>
<html lang="id">
<head>
    <title>HBD Sayangku Anggie ❤️</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link href="css/main.css" rel="stylesheet">
    
    <style>
        /* Paksa penuh tanpa scroll */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #4ec0ca; }
        #custom-footer { position: fixed; bottom: 10px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #custom-footer p { color: white; font-family: sans-serif; font-size: 12px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="gamecontainer">
        <div id="gamescreen">
            <div id="sky" class="animated">
                <div id="flyarea">
                    <div id="ceiling" class="animated"></div>
                    <div id="player" class="bird animated"></div>
                    <div id="bigscore"></div>
                    <div id="splash"></div>
                    <div id="scoreboard">
                        <div id="medal"></div>
                        <div id="currentscore"></div>
                        <div id="highscore"></div>
                        <div id="replay"><img src="assets/replay.png" alt="replay"></div>
                    </div>
                </div>
            </div>
            <div id="land" class="animated"><div id="debug"></div></div>
        </div>
    </div>
    
    <div id="custom-footer"><p>Dibuat dengan ❤️ oleh Anggun buat Anggie</p></div>

    <script src="js/jquery.min.js"></script>
    <script src="js/jquery.transit.min.js"></script>
    <script src="js/buzz.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
